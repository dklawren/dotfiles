# Alacritty — colors come from the active theme (see the `theme` package and the
# `theme-switch` command). Alacritty live-reloads when this file or the imported
# one changes.
[general]
import = ["~/.config/theme-active/alacritty.toml"]

[window]
padding = { x = 10, y = 10 }
opacity = 0.97
decorations = "none"

[font]
size = 11.0
normal = { family = "Cascadia Mono NF", style = "Regular" }
bold = { family = "Cascadia Mono NF", style = "Bold" }
italic = { family = "Cascadia Mono NF", style = "Italic" }
