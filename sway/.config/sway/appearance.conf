# title bar
font pango:"Cascadia Code NF" Regular 12
titlebar_padding 1
titlebar_border_thickness 0

# adjusting borders
for_window [app_id="^.*"] border pixel 2
default_border none
default_floating_border none
for_window [class=".*"] title_format "*%title"

# Hide borders at the edge of the screen
hide_edge_borders smart

###############
# Gaps settings
###############
gaps inner 5
gaps outer 1
gaps top 1
gaps bottom 1

# Hide gaps when there is only 1 window
smart_gaps on

######################################
# color settings fo windows
######################################

# Tokyo Night Color Scheme
# https://github.com/folke/tokyonight.nvim
set $bg-color      #1a1b26
set $bg-alt        #16161e
set $bg-highlight  #2f3549
set $fg-color      #c0caf5
set $fg-dark       #a9b1d6
set $comment       #565f89

set $blue          #7aa2f7
set $cyan          #7dcfff
set $green         #9ece6a
set $red           #f7768e
set $yellow        #e0af68
set $orange        #ff9e64
set $purple        #bb9af7
set $magenta       #bb9af7

# Property Name          Border        BG             Text        Indicator   Child Border
client.focused           $blue         $bg-highlight  $fg-color   $cyan       $blue
client.focused_inactive  $comment      $bg-alt        $fg-dark    $bg-color   $comment
client.unfocused         $bg-highlight $bg-color      $comment    $bg-color   $bg-highlight
client.urgent            $red          $red           $bg-color   $red        $red
client.placeholder       $bg-color     $bg-color      $fg-dark    $bg-color   $bg-color
client.background        $bg-color
