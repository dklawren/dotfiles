# Catppuccin Mocha — mako config (whole file; mako has no include directive)
# ~/.config/mako/config is symlinked here by theme-switch.
font=Cascadia Mono NF 11
background-color=#1e1e2eee
text-color=#cdd6f4
border-color=#b4befe
border-size=2
border-radius=8
padding=10
margin=8
default-timeout=5000
ignore-timeout=false
max-visible=5
layer=overlay
anchor=top-right
width=320
height=110
on-notify=exec canberra-gtk-play -i message-new-instant 2>/dev/null || paplay /usr/share/sounds/freedesktop/stereo/message.oga

[urgency=low]
border-color=#585b70

[urgency=high]
border-color=#f38ba8
background-color=#302030ee
default-timeout=0
