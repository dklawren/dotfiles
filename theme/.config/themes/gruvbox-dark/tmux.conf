# Gruvbox Dark — tmux theme fragment (sourced after the plugin manager).
# The catppuccin-tmux plugin only renders Catppuccin flavours, so for Gruvbox
# we override the status styling directly. This is a starting point — tweak the
# segment colours to taste.
set -g status-style              "bg=#282828,fg=#ebdbb2"
set -g status-left-style         "bg=#83a598,fg=#282828"
set -g status-right-style        "bg=#3c3836,fg=#ebdbb2"
set -g window-status-current-style "bg=#fabd2f,fg=#282828"
set -g window-status-style       "bg=#3c3836,fg=#a89984"
set -g pane-border-style         "fg=#504945"
set -g pane-active-border-style  "fg=#83a598"
set -g message-style             "bg=#3c3836,fg=#ebdbb2"
set -g mode-style                "bg=#fabd2f,fg=#282828"
