# Gruvbox Dark — mako config (whole file; mako has no include directive)
font=Cascadia Mono NF 11
background-color=#282828ee
text-color=#ebdbb2
border-color=#83a598
border-size=2
border-radius=8
padding=10
margin=8
default-timeout=5000
ignore-timeout=false
max-visible=5
layer=overlay
anchor=top-right
width=320
height=110
on-notify=exec canberra-gtk-play -i message-new-instant 2>/dev/null || paplay /usr/share/sounds/freedesktop/stereo/message.oga

[urgency=low]
border-color=#665c54

[urgency=high]
border-color=#fb4934
background-color=#3c2828ee
default-timeout=0
